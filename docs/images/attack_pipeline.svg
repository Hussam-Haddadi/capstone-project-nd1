<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="100%" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Attack Simulator Pipeline</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#64748b">From original messages to Golden Dataset</text>

  <!-- Step 1 -->
  <rect x="40" y="80" width="200" height="75" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">1. Original Corpus</text>
  <text x="140" y="128" text-anchor="middle" font-size="11" fill="#475569">1,186 real messages</text>
  <text x="140" y="144" text-anchor="middle" font-size="10" fill="#64748b">596 phishing + 590 safe</text>

  <line x1="245" y1="117" x2="285" y2="117" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="290" y="80" width="200" height="75" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="390" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">2. N-gram Learning</text>
  <text x="390" y="128" text-anchor="middle" font-size="11" fill="#1e40af">Word + char patterns</text>
  <text x="390" y="144" text-anchor="middle" font-size="10" fill="#2563eb">Learns Arabic SMS style</text>

  <line x1="495" y1="117" x2="535" y2="117" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="540" y="80" width="200" height="75" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="640" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">3. Template Engine</text>
  <text x="640" y="128" text-anchor="middle" font-size="11" fill="#92400e">8 phishing categories</text>
  <text x="640" y="144" text-anchor="middle" font-size="10" fill="#b45309">Brand, reward, delivery...</text>

  <line x1="640" y1="160" x2="640" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="490" y="205" width="300" height="75" rx="10" fill="#e9d5ff" stroke="#7e22ce" stroke-width="2"/>
  <text x="640" y="233" text-anchor="middle" font-size="13" font-weight="600" fill="#581c87">4. Slot Filling + Variation</text>
  <text x="640" y="253" text-anchor="middle" font-size="11" fill="#6b21a8">Brands, URLs, phones, leetspeak</text>
  <text x="640" y="269" text-anchor="middle" font-size="10" fill="#7e22ce">Realistic diverse messages</text>

  <line x1="640" y1="285" x2="640" y2="325" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Adversarial -->
  <rect x="440" y="330" width="400" height="85" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="640" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">5. Adversarial Mutations</text>
  <text x="640" y="375" text-anchor="middle" font-size="11" fill="#991b1b">Leetspeak · Typosquatting · URL shortening</text>
  <text x="640" y="395" text-anchor="middle" font-size="10" fill="#b91c1c">Synonym swap · Char duplication · Mixed script</text>

  <!-- Arrow to defense test -->
  <line x1="640" y1="420" x2="640" y2="460" stroke="#ef4444" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Step 6: Test vs Defense -->
  <rect x="440" y="465" width="400" height="75" rx="10" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
  <text x="640" y="493" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">6. Test vs Defense Model</text>
  <text x="640" y="513" text-anchor="middle" font-size="11" fill="#9a3412">Evaded? → feed back to generator</text>
  <text x="640" y="529" text-anchor="middle" font-size="10" fill="#c2410c">Detected? → include in Golden Dataset</text>

  <!-- Feedback loop arrow -->
  <path d="M 840 500 Q 870 370 840 240 Q 820 200 780 205" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <text x="870" y="370" font-size="10" fill="#ef4444" transform="rotate(90, 870, 370)">feedback loop</text>

  <!-- Final output -->
  <rect x="40" y="300" width="300" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="190" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">📦 Golden Dataset</text>
  <text x="190" y="350" text-anchor="middle" font-size="12" fill="#166534">2,462 balanced messages</text>
  <text x="190" y="370" text-anchor="middle" font-size="11" fill="#15803d">1,392 phishing · 1,070 safe</text>
  <text x="190" y="388" text-anchor="middle" font-size="10" fill="#166534" font-style="italic">→ feeds defense model training</text>

  <line x1="485" y1="370" x2="345" y2="370" stroke="#16a34a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Left side: safe generation -->
  <rect x="40" y="195" width="200" height="75" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="140" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Safe Generator</text>
  <text x="140" y="240" text-anchor="middle" font-size="10" fill="#166534">Legitimate messages</text>
  <text x="140" y="256" text-anchor="middle" font-size="9" fill="#15803d">with phones + URLs</text>
  <line x1="140" y1="275" x2="140" y2="295" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
