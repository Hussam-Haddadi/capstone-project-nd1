<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="100%" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">
    Project Architecture
  </text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#64748b">
    Modular design — separation of concerns
  </text>

  <!-- ========== Layer 1: Data ========== -->
  <g>
    <rect x="40" y="90" width="820" height="90" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="60" y="115" font-size="14" font-weight="700" fill="#78350f">📁 data/</text>
    <text x="60" y="132" font-size="11" fill="#92400e">Raw and processed datasets</text>
    
    <rect x="80" y="145" width="200" height="28" rx="5" fill="white" stroke="#d97706"/>
    <text x="180" y="164" text-anchor="middle" font-size="11" font-family="monospace" fill="#78350f">
      raw/final_merged_data.csv
    </text>
    
    <rect x="300" y="145" width="200" height="28" rx="5" fill="white" stroke="#d97706"/>
    <text x="400" y="164" text-anchor="middle" font-size="11" font-family="monospace" fill="#78350f">
      processed/golden_dataset.csv
    </text>
    
    <text x="540" y="164" font-size="10" fill="#92400e" font-style="italic">
      1,186 original → 2,462 balanced
    </text>
  </g>

  <!-- ========== Layer 2: Source Code ========== -->
  <g>
    <rect x="40" y="200" width="820" height="140" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="60" y="225" font-size="14" font-weight="700" fill="#1e3a8a">⚙️ src/ &mdash; Core Library</text>
    <text x="60" y="242" font-size="11" fill="#1e40af">Business logic — shared across notebooks, tests, and external consumers</text>

    <!-- Four boxes -->
    <rect x="80" y="258" width="170" height="70" rx="6" fill="white" stroke="#2563eb"/>
    <text x="165" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">config.py</text>
    <text x="165" y="298" text-anchor="middle" font-size="10" fill="#475569">Brand lists,</text>
    <text x="165" y="314" text-anchor="middle" font-size="10" fill="#475569">keywords, TLDs</text>
    
    <rect x="270" y="258" width="170" height="70" rx="6" fill="white" stroke="#2563eb"/>
    <text x="355" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">features.py</text>
    <text x="355" y="298" text-anchor="middle" font-size="10" fill="#475569">39 features</text>
    <text x="355" y="314" text-anchor="middle" font-size="10" fill="#475569">+ URL parsing</text>
    
    <rect x="460" y="258" width="170" height="70" rx="6" fill="white" stroke="#2563eb"/>
    <text x="545" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">rules.py</text>
    <text x="545" y="298" text-anchor="middle" font-size="10" fill="#475569">8 hard rules</text>
    <text x="545" y="314" text-anchor="middle" font-size="10" fill="#475569">safety net</text>
    
    <rect x="650" y="258" width="170" height="70" rx="6" fill="white" stroke="#1d4ed8" stroke-width="2"/>
    <text x="735" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">detector.py</text>
    <text x="735" y="298" text-anchor="middle" font-size="10" fill="#475569">PhishingDetector</text>
    <text x="735" y="314" text-anchor="middle" font-size="10" fill="#475569">(public API)</text>
  </g>

  <!-- ========== Layer 3: Models ========== -->
  <g>
    <rect x="40" y="360" width="240" height="80" rx="10" fill="#e9d5ff" stroke="#7e22ce" stroke-width="1.5"/>
    <text x="60" y="385" font-size="14" font-weight="700" fill="#581c87">🤖 models/</text>
    <text x="60" y="402" font-size="11" fill="#6b21a8">Trained artifacts</text>
    <text x="60" y="425" font-size="10" font-family="monospace" fill="#7e22ce">sms_phishing_model_v4.pkl</text>
  </g>

  <!-- ========== Layer 4: Notebooks ========== -->
  <g>
    <rect x="300" y="360" width="300" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="320" y="385" font-size="14" font-weight="700" fill="#14532d">📓 notebooks/</text>
    <text x="320" y="402" font-size="11" fill="#166534">Documentation & reproducibility</text>
    <text x="320" y="420" font-size="10" fill="#15803d">01_exploration → 05_test_model</text>
  </g>

  <!-- ========== Layer 5: Tests ========== -->
  <g>
    <rect x="620" y="360" width="240" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="640" y="385" font-size="14" font-weight="700" fill="#7f1d1d">✅ tests/</text>
    <text x="640" y="402" font-size="11" fill="#991b1b">Unit & regression tests</text>
    <text x="640" y="420" font-size="10" font-family="monospace" fill="#b91c1c">test_detector.py</text>
  </g>

  <!-- ========== Layer 6: Downstream Consumer ========== -->
  <g>
    <rect x="300" y="460" width="300" height="80" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="450" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">
      🌐 Frontend / API (separate branch)
    </text>
    <text x="450" y="504" text-anchor="middle" font-size="11" fill="#475569">
      from src.detector import PhishingDetector
    </text>
    <text x="450" y="522" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">
      This repo ships the model; downstream teams ship the product
    </text>
  </g>

  <!-- Connecting arrows -->
  <!-- data -> src -->
  <line x1="450" y1="180" x2="450" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <!-- src -> models -->
  <line x1="735" y1="340" x2="200" y2="360" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr2)"/>
  <!-- src -> notebooks -->
  <line x1="735" y1="340" x2="450" y2="360" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr2)"/>
  <!-- src -> tests -->
  <line x1="735" y1="340" x2="735" y2="360" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr2)"/>
  <!-- detector -> consumer -->
  <line x1="735" y1="340" x2="450" y2="460" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arr2)"/>
</svg>
