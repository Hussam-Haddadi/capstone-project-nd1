<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="100%" font-family="system-ui, -apple-system, sans-serif">
  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">
    39 Hand-Crafted Features
  </text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#64748b">
    Grouped by what they capture
  </text>

  <!-- URL features -->
  <g>
    <rect x="40" y="80" width="260" height="160" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="60" y="105" font-size="14" font-weight="700" fill="#1e3a8a">🔗 URL Features (14)</text>
    <text x="60" y="130" font-size="10" fill="#1e40af">has_url, url_count, sus_tld,</text>
    <text x="60" y="148" font-size="10" fill="#1e40af">trusted_tld, trusted_dom,</text>
    <text x="60" y="166" font-size="10" fill="#1e40af">brand_imp, hyph_url,</text>
    <text x="60" y="184" font-size="10" fill="#1e40af">url_hyph_n, shortener,</text>
    <text x="60" y="202" font-size="10" fill="#1e40af">typosquat, leet, url_max_len,</text>
    <text x="60" y="220" font-size="10" fill="#1e40af">url_dot_count, url_levenshtein</text>
  </g>

  <!-- Phone features -->
  <g>
    <rect x="320" y="80" width="260" height="160" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="340" y="105" font-size="14" font-weight="700" fill="#14532d">📞 Phone Features (5)</text>
    <text x="340" y="135" font-size="10" fill="#166534">has_phone</text>
    <text x="340" y="153" font-size="10" fill="#166534">phone_n</text>
    <text x="340" y="171" font-size="10" fill="#166534">mobile (05X)</text>
    <text x="340" y="189" font-size="10" fill="#166534">official_ph (920/800)</text>
    <text x="340" y="207" font-size="10" fill="#166534">multi_phone</text>
    
    <text x="340" y="228" font-size="9" fill="#15803d" font-style="italic">
      Catches vishing attempts
    </text>
  </g>

  <!-- Spam features -->
  <g>
    <rect x="600" y="80" width="260" height="160" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
    <text x="620" y="105" font-size="14" font-weight="700" fill="#78350f">🚫 Spam Features (2)</text>
    <text x="620" y="135" font-size="10" fill="#92400e">spam_svc</text>
    <text x="620" y="153" font-size="10" fill="#92400e">ph_spam (phone + service)</text>
    
    <text x="620" y="185" font-size="11" font-weight="600" fill="#78350f">Catches:</text>
    <text x="620" y="203" font-size="9" fill="#92400e">• Visa/permit spam</text>
    <text x="620" y="218" font-size="9" fill="#92400e">• Loan/finance spam</text>
  </g>

  <!-- Text Structure -->
  <g>
    <rect x="40" y="260" width="260" height="160" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <text x="60" y="285" font-size="14" font-weight="700" fill="#831843">📝 Text Structure (7)</text>
    <text x="60" y="310" font-size="10" fill="#9f1239">txt_len, word_n</text>
    <text x="60" y="328" font-size="10" fill="#9f1239">excl (! count), question (?)</text>
    <text x="60" y="346" font-size="10" fill="#9f1239">arabic_ratio</text>
    <text x="60" y="364" font-size="10" fill="#9f1239">has_https, has_http_no_s</text>
    
    <text x="60" y="395" font-size="9" fill="#be185d" font-style="italic">
      Detects HTTP-only links,
    </text>
    <text x="60" y="408" font-size="9" fill="#be185d" font-style="italic">
      mixed-language spoofs
    </text>
  </g>

  <!-- Psychological -->
  <g>
    <rect x="320" y="260" width="260" height="160" rx="10" fill="#e9d5ff" stroke="#7e22ce" stroke-width="2"/>
    <text x="340" y="285" font-size="14" font-weight="700" fill="#581c87">🧠 Psychological (10)</text>
    <text x="340" y="310" font-size="10" fill="#6b21a8">urgency, reward,</text>
    <text x="340" y="328" font-size="10" fill="#6b21a8">threat, action, manip</text>
    <text x="340" y="346" font-size="10" fill="#6b21a8">thr_act, rew_act</text>
    <text x="340" y="364" font-size="10" fill="#6b21a8">social_eng, vishing,</text>
    <text x="340" y="382" font-size="10" fill="#6b21a8">personal_addr</text>
    
    <text x="340" y="408" font-size="9" fill="#7e22ce" font-style="italic">
      Captures manipulation tactics
    </text>
  </g>

  <!-- Risk Score -->
  <g>
    <rect x="600" y="260" width="260" height="160" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <text x="620" y="285" font-size="14" font-weight="700" fill="#7f1d1d">⚠️ Risk Score (1)</text>
    <text x="620" y="308" font-size="11" font-weight="600" fill="#991b1b">risk</text>
    
    <text x="620" y="335" font-size="10" fill="#b91c1c">Composite weighted sum:</text>
    <text x="630" y="352" font-size="9" fill="#991b1b">+ suspicious signals</text>
    <text x="630" y="368" font-size="9" fill="#991b1b">+ psychological cues</text>
    <text x="630" y="384" font-size="9" fill="#991b1b">− trusted signals</text>
    
    <text x="620" y="408" font-size="9" fill="#b91c1c" font-style="italic">
      Single explainable number
    </text>
  </g>
</svg>
